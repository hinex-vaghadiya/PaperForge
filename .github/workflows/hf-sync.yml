name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "bot@huggingface.co"
          git config --global user.name "Hugging Face Sync"
          git remote add hf https://hinex-07:$HF_TOKEN@huggingface.co/spaces/hinex-07/paperforge-backend
          for i in 1 2 3; do
            git push hf main --force && break
            echo "Push failed (attempt $i), waiting 15s..."
            sleep 15
          done
